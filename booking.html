<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservar Clase — Aliza Pilates Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #F4F0E7; --paper-2: #EBE4D6; --ivory: #FBF9F4;
      --espresso: #211C15; --espresso-2: #2C261D; --ink: #2B2620;
      --taupe: #7B7468; --taupe-light: #A29A8C; --gold: #A6885A; --gold-soft: #C4A878;
      --line: rgba(43,38,32,0.14);
      /* legacy variable names kept (used by JS-injected markup) → remapped to new palette */
      --greige: #D8CFBE; --greige-light: #EBE4D6; --greige-dark: #A29A8C;
      --charcoal: #7B7468; --charcoal-dark: #211C15; --cream: #F4F0E7;
      --white: #FFFFFF; --text-dark: #2B2620; --success: #4A7C59; --error: #C0392B;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }
    img { display: block; }

    /* ─────────── NAV ─────────── */
    nav {
      background: rgba(244,240,231,0.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      padding: 1rem 3.5rem; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 0 var(--line); position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo img { height: 40px; width: auto; }
    .nav-right { display: flex; align-items: center; gap: 1.6rem; }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--taupe); text-decoration: none; transition: color .25s; }
    .nav-back:hover { color: var(--ink); }
    .lang-toggle {
      background: none; border: 1px solid var(--line); border-radius: 40px;
      padding: 0.4rem 0.95rem; cursor: pointer; font-family: 'Jost', sans-serif;
      font-size: 0.68rem; letter-spacing: 0.16em; color: var(--taupe); transition: all .25s;
    }
    .lang-toggle:hover { background: var(--paper-2); color: var(--ink); }

    /* ─────────── HEADER ─────────── */
    .page-header { background: var(--espresso); color: var(--paper); padding: 4.5rem 3.5rem; text-align: center; position: relative; overflow: hidden; }
    .page-header .eyebrow {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-soft); margin-bottom: 1rem;
    }
    .page-header .eyebrow::before, .page-header .eyebrow::after { content: ''; width: 22px; height: 1px; background: var(--gold-soft); }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 4.4vw, 3.6rem); font-weight: 300; line-height: 1.05; }
    .page-header h1 em { font-style: italic; color: var(--gold-soft); }
    .page-header .sub { margin-top: 1rem; font-size: 0.92rem; color: rgba(244,240,231,0.66); letter-spacing: 0.02em; }

    /* ─────────── LAYOUT ─────────── */
    .booking-layout { max-width: 1140px; margin: 0 auto; padding: 3.5rem 2rem 5rem; display: grid; grid-template-columns: 290px 1fr; gap: 3.5rem; align-items: start; }

    /* ─────────── FILTERS ─────────── */
    .filters-panel { background: var(--ivory); padding: 2rem; border: 1px solid var(--line); height: fit-content; position: sticky; top: 90px; }
    .filters-toggle { display: none; }
    .filter-title { font-size: 0.66rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.6rem; }
    .filter-group { margin-bottom: 1.6rem; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-group label { display: block; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); margin-bottom: 0.55rem; }
    .filter-group input, .filter-group select {
      width: 100%; padding: 0.8rem 0.9rem; border: 1px solid var(--line);
      background: var(--paper); font-family: 'Jost', sans-serif; font-size: 0.88rem;
      color: var(--ink); outline: none; transition: border-color .25s; border-radius: 2px;
    }
    .filter-group input:focus, .filter-group select:focus { border-color: var(--gold); }

    /* ─────────── SLOTS ─────────── */
    .slots-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .slots-count { font-size: 0.8rem; color: var(--taupe); letter-spacing: 0.04em; }

    .instructor-group { margin-bottom: 3rem; }
    .instructor-group-header { display: flex; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--line); margin-bottom: 1.6rem; }
    .instructor-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--espresso); color: var(--gold-soft);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 0.04em; flex-shrink: 0;
    }
    .instructor-group-header h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; color: var(--ink); }

    .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

    .slot-card {
      background: var(--ivory); border: 1px solid var(--line); border-top: 2px solid var(--line);
      padding: 1.3rem 1.2rem; cursor: pointer; position: relative;
      transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s, border-color .35s, background .35s;
    }
    .slot-card:hover { transform: translateY(-5px); border-top-color: var(--gold); box-shadow: 0 18px 40px -24px rgba(33,28,21,0.45); background: #fff; }
    .slot-card.selected { border-color: var(--gold); border-top-width: 2px; background: #fff; }
    .slot-card.booked { opacity: 0.4; cursor: not-allowed; background: var(--paper-2); transform: none; box-shadow: none; }
    .slot-date { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
    .slot-time { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 500; color: var(--ink); line-height: 1; }
    .slot-type { font-size: 0.72rem; color: var(--taupe); margin-top: 0.3rem; letter-spacing: 0.04em; }
    .slot-booked-label { font-size: 0.68rem; color: var(--taupe-light); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.4rem; }

    .slot-mode-badge { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.7rem; padding: 0.28rem 0.6rem; display: inline-block; border-radius: 30px; }
    .slot-mode-badge.private { background: #eef5f0; color: #3f6b4d; border: 1px solid #bcd9c6; }
    .slot-mode-badge.group { background: var(--paper-2); color: var(--espresso); border: 1px solid var(--greige); }
    .slot-mode-badge.both { background: #faf6ee; color: var(--gold); border: 1px solid #e6dcc6; }

    .no-slots { text-align: center; padding: 4.5rem 2rem; color: var(--taupe); border: 1px dashed var(--line); background: var(--ivory); }
    .no-slots p { font-size: 1rem; line-height: 1.9; }

    .loading { text-align: center; padding: 4.5rem; color: var(--taupe); letter-spacing: 0.12em; font-size: 0.85rem; }
    .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 0.4rem; }

    /* ─────────── MODAL ─────────── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,17,12,0.62); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--ivory); max-width: 480px; width: 100%; padding: 2.6rem; position: relative; animation: slideUp .3s ease; box-shadow: 0 30px 70px rgba(20,17,12,0.4); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .modal-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--taupe); line-height: 1; transition: color .2s; }
    .modal-close:hover { color: var(--ink); }
    .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--ink); margin-bottom: 0.5rem; }
    .modal-slot-info { background: var(--paper); padding: 1.1rem 1.3rem; margin: 1.3rem 0; border-left: 3px solid var(--gold); }
    .modal-slot-info p { font-size: 0.86rem; line-height: 1.85; color: var(--ink); }
    .modal-slot-info strong { font-weight: 500; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); margin-bottom: 0.5rem; }
    .form-group input { width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--line); background: var(--paper); font-family: 'Jost', sans-serif; font-size: 0.9rem; color: var(--ink); outline: none; transition: border-color .2s; }
    .form-group input:focus { border-color: var(--gold); }
    .btn-confirm {
      width: 100%; padding: 1.05rem; background: var(--espresso); color: var(--paper);
      border: none; font-family: 'Jost', sans-serif; font-size: 0.78rem; letter-spacing: 0.2em;
      text-transform: uppercase; cursor: pointer; transition: background .3s; margin-top: 0.5rem;
    }
    .btn-confirm:hover { background: var(--gold); color: #fff; }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    .success-screen { text-align: center; padding: 1rem 0; }
    .success-icon { width: 64px; height: 64px; margin: 0 auto 1.2rem; border-radius: 50%; background: var(--espresso); color: var(--gold-soft); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; animation: pop .4s ease; }
    @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-screen h3 { font-family: 'Cormorant Garamond', serif; font-size: 2.1rem; font-weight: 300; color: var(--ink); margin-bottom: 0.8rem; }
    .success-screen p { font-size: 0.9rem; color: var(--taupe); line-height: 1.75; }

    /* ─────────── LANG ─────────── */
    [data-lang="en"] { display: none; }
    [data-lang="es"] { display: block; }
    body.es [data-lang="en"] { display: none; }
    body.es [data-lang="es"] { display: block; }
    body:not(.es) [data-lang="es"] { display: none; }
    body:not(.es) [data-lang="en"] { display: block; }
    span[data-lang="en"] { display: none; }
    body.es span[data-lang="es"] { display: inline; }
    body:not(.es) span[data-lang="en"] { display: inline; }
    body:not(.es) span[data-lang="es"] { display: none; }

    /* ─────────── TABLET ─────────── */
    @media (max-width: 768px) {
      nav { padding: 0.9rem 1.2rem; }
      .booking-layout { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem 1.2rem 4rem; }
      .filters-panel { position: static; top: auto; }
      .slots-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .page-header { padding: 3rem 1.2rem; }
    }

    /* ─────────── PHONE ─────────── */
    @media (max-width: 480px) {
      nav { padding: 0.8rem 1rem; }
      .nav-logo img { height: 34px; }
      .nav-right { gap: 1rem; }
      .nav-back { font-size: 0.68rem; letter-spacing: 0.12em; }

      .page-header { padding: 2.4rem 1.2rem; }
      .page-header h1 { font-size: clamp(1.9rem, 7.5vw, 2.5rem); }
      .page-header .sub { font-size: 0.85rem; }

      .booking-layout { padding: 1rem 1rem 5.5rem; gap: 1.2rem; }

      /* Filters: collapsible accordion */
      .filters-panel { padding: 0; }
      .filters-toggle {
        width: 100%; padding: 1.1rem 1.3rem; display: flex; align-items: center; justify-content: space-between;
        background: var(--ivory); border: none; cursor: pointer; font-family: 'Jost', sans-serif;
        font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink);
      }
      .filters-toggle-arrow { font-size: 0.85rem; color: var(--gold); transition: transform .25s; }
      .filters-toggle-arrow.open { transform: rotate(180deg); }
      .filters-body { display: none; padding: 0 1.3rem 1.3rem; }
      .filters-body.open { display: block; }
      .filter-title { display: none; }

      .slots-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
      .slot-card { padding: 1.1rem 0.9rem; }
      .slot-card:hover { transform: none; }
      .slot-time { font-size: 1.45rem; }
      .slot-date { font-size: 0.62rem; }
      .slot-mode-badge { font-size: 0.56rem; padding: 0.22rem 0.45rem; margin-top: 0.5rem; }

      .instructor-group-header h3 { font-size: 1.25rem; }
      .instructor-avatar { width: 42px; height: 42px; }
      .instructor-group { margin-bottom: 2.2rem; }
      .no-slots { padding: 3rem 1rem; }

      /* Modal: bottom sheet */
      .modal-overlay { align-items: flex-end; padding: 0; }
      .modal { max-width: 100%; width: 100%; padding: 1.9rem 1.3rem calc(2.5rem + env(safe-area-inset-bottom)); border-radius: 18px 18px 0 0; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .modal h2 { font-size: 1.6rem; }
      .form-group input { font-size: 1rem; padding: 0.9rem 1rem; }
      .btn-confirm { padding: 1.05rem; font-size: 0.78rem; min-height: 54px; }
      .modal-close { top: 1.1rem; right: 1.1rem; font-size: 1.7rem; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    }
  </style>
</head>

<script>
const SUPABASE_URL = 'https://jpbouksgzaaykkqgsipa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwYm91a3NnemFheWtrcWdzaXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQyNTUsImV4cCI6MjA4OTQ1MDI1NX0.XxoVzmz7BACVvI3UYUhoxG-p7W7Ck8EGbMXK9IB2azg';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function sendEmail(type, to, data) {
  try {
    await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ type, to, data })
    });
  } catch(e) { console.error('Email error:', e); }
}

async function updateCalendarBooking(data) {
  try {
    await fetch(`${SUPABASE_URL}/functions/v1/manage-google-calendar-event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ action: 'update_booking', ...data })
    });
  } catch(e) { console.error('Calendar update error:', e); }
}

let allSlots = [];
let allInstructors = [];
let selectedSlot = null;
let selectedBookingMode = 'private'; // 'private' or 'group'
const isEs = () => document.body.classList.contains('es');

function toggleFilters() {
  const body = document.getElementById('filters-body');
  const arrow = document.getElementById('filters-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

// On desktop, always show filters body
function initFilters() {
  if (window.innerWidth > 480) {
    document.getElementById('filters-body').classList.add('open');
  }
}
initFilters();
window.addEventListener('resize', initFilters);

function toggleLang(btn) {
  document.body.classList.toggle('es');
  btn.querySelector('.lang-label').textContent = document.body.classList.contains('es') ? 'EN' : 'ES';
  renderSlots();
}

async function loadData() {
  const { data: instructors } = await supabaseClient.from('instructors').select('*');
  const { data: slots } = await supabaseClient
    .from('time_slots')
    .select('*, instructors(id, name, email), group_booking_count')
    .gte('date', new Date().toISOString().split('T')[0])
    .order('date').order('start_time');

  allInstructors = instructors || [];
  allSlots = slots || [];

  const sel = document.getElementById('filter-instructor');
  sel.innerHTML = `<option value="">${isEs() ? 'Todas las instructoras' : 'All instructors'}</option>`;
  allInstructors.forEach(i => {
    sel.innerHTML += `<option value="${i.id}">${i.name}</option>`;
  });

  renderSlots();
}

function getGroupCount(slot) {
  return slot.group_booking_count || 0;
}

function getFilteredSlots() {
  const date = document.getElementById('filter-date').value;
  const instructor = document.getElementById('filter-instructor').value;
  return allSlots.filter(s => {
    if (date && s.date !== date) return false;
    if (instructor && s.instructor_id !== instructor) return false;
    // Hide fully-booked slots
    const groupCount = getGroupCount(s);
    const isGroupFull = groupCount >= 4;
    if (s.slot_mode === 'private_only' && s.is_booked) return false;
    if (s.slot_mode === 'group_only' && isGroupFull) return false;
    if (s.slot_mode === 'both' && s.is_booked && isGroupFull) return false;
    return true;
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const opts = isEs()
    ? { weekday: 'short', day: 'numeric', month: 'short' }
    : { weekday: 'short', month: 'short', day: 'numeric' };
  return d.toLocaleDateString(isEs() ? 'es-PA' : 'en-US', opts);
}

function formatTime(timeStr) {
  const [h, m] = timeStr.split(':');
  const hour = parseInt(h);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const h12 = hour > 12 ? hour - 12 : hour === 0 ? 12 : hour;
  return `${h12}:${m} ${ampm}`;
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).slice(0, 2).join('');
}

function renderSlots() {
  const filtered = getFilteredSlots();
  const container = document.getElementById('slots-container');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-slots">
      <p>${isEs() ? 'No hay clases disponibles con estos filtros.<br>Intenta cambiar la fecha o la instructora.' : 'No classes available with these filters.<br>Try changing the date or instructor.'}</p>
    </div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(slot => {
    const key = slot.instructor_id;
    if (!grouped[key]) grouped[key] = { name: slot.instructors?.name || 'Instructora', slots: [] };
    grouped[key].slots.push(slot);
  });

  let html = '';
  Object.values(grouped).forEach(group => {
    html += `<div class="instructor-group">
      <div class="instructor-group-header">
        <div class="instructor-avatar">${getInitials(group.name)}</div>
        <h3>${group.name}</h3>
      </div>
      <div class="slots-grid">`;

    group.slots.forEach(slot => {
      const groupCount = getGroupCount(slot);
      const spotsLeft = 4 - groupCount;
      const mode = slot.slot_mode || 'both';

      // Build badge — if 'both' but already has group bookings, show as group
      const effectiveMode = (mode === 'both' && groupCount > 0) ? 'group_only' : mode;
      let badge = '';
      if (effectiveMode === 'private_only') {
        badge = `<div class="slot-mode-badge private">${isEs() ? 'Solo Privada' : 'Private Only'}</div>`;
      } else if (effectiveMode === 'group_only') {
        badge = `<div class="slot-mode-badge group">${isEs() ? `Grupal · ${spotsLeft} lugar${spotsLeft !== 1 ? 'es' : ''} libre${spotsLeft !== 1 ? 's' : ''}` : `Group · ${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} left`}</div>`;
      } else {
        badge = `<div class="slot-mode-badge both">${isEs() ? 'Privada o Grupal' : 'Private or Group'}</div>`;
      }

      html += `<div class="slot-card" onclick="selectSlot('${slot.id}')">
        <div class="slot-date">${formatDate(slot.date)}</div>
        <div class="slot-time">${formatTime(slot.start_time)}</div>
        ${badge}
      </div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;
}

async function selectSlot(slotId) {
  selectedSlot = allSlots.find(s => s.id === slotId);
  if (!selectedSlot) return;
  const es = isEs();
  const mode = selectedSlot.slot_mode || 'both';
  const groupCount = getGroupCount(selectedSlot);
  const spotsLeft = 4 - groupCount;

  // Load profile
  const { data: { session } } = await supabaseClient.auth.getSession();
  let profile = null;
  if (session?.user?.id) {
    const { data } = await supabaseClient
      .from('customer_profiles').select('full_name, phone').eq('id', session.user.id).single();
    profile = data;

    // ── FIX: Check if this user already has an active booking for this slot ──
    const { data: existingBooking } = await supabaseClient
      .from('bookings')
      .select('id, booking_mode')
      .eq('slot_id', slotId)
      .eq('customer_id', session.user.id)
      .eq('cancelled', false)
      .maybeSingle();

    if (existingBooking) {
      const modeLabel = existingBooking.booking_mode === 'group'
        ? (es ? 'grupal' : 'group') : (es ? 'privada' : 'private');
      document.getElementById('modal-content').innerHTML = `
        <div style="text-align:center;padding:1rem 0;">
          <div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--charcoal-dark);margin-bottom:0.8rem;">
            ${es ? 'Ya tienes una reserva' : 'Already booked'}
          </h2>
          <p style="font-size:0.88rem;color:var(--charcoal);line-height:1.7;margin-bottom:1.5rem;">
            ${es
              ? `Ya tienes una reserva <strong>${modeLabel}</strong> para esta clase. Puedes verla en tu cuenta.`
              : `You already have a <strong>${modeLabel}</strong> booking for this class. You can view it in your account.`}
          </p>
          <a href="customer.html" style="display:block;padding:0.9rem;background:var(--charcoal-dark);color:white;text-align:center;text-decoration:none;font-family:'Jost',sans-serif;font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.8rem;">
            ${es ? 'VER MIS RESERVAS' : 'VIEW MY BOOKINGS'}
          </a>
          <button class="btn-confirm" style="background:none;border:1px solid var(--greige);color:var(--charcoal-dark);" onclick="closeModal()">
            ${es ? 'CERRAR' : 'CLOSE'}
          </button>
        </div>`;
      document.getElementById('modal').classList.add('active');
      return;
    }
  }

  const slotInfo = `
    <div class="modal-slot-info">
      <p>
        <strong>${es ? 'Instructora' : 'Instructor'}:</strong> ${selectedSlot.instructors?.name}<br>
        <strong>${es ? 'Fecha' : 'Date'}:</strong> ${formatDate(selectedSlot.date)}<br>
        <strong>${es ? 'Hora' : 'Time'}:</strong> ${formatTime(selectedSlot.start_time)} — ${es ? '1 hora' : '1 hour'}
      </p>
    </div>
    <div style="background:var(--cream);border:1px solid var(--greige-light);padding:1rem 1.2rem;margin-bottom:1rem;">
      <p style="font-size:0.78rem;color:var(--charcoal-dark);line-height:1.8;">
        <strong>${es ? 'Alumno' : 'Student'}:</strong> ${profile?.full_name || session?.user?.email || '—'}<br>
        <strong>${es ? 'Teléfono' : 'Phone'}:</strong> ${profile?.phone || '—'}
      </p>
    </div>`;

  let modeSelector = '';
  if (mode === 'private_only') {
    selectedBookingMode = 'private';
    modeSelector = `<div style="background:#f0f7f2;border-left:3px solid #4A7C59;padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.82rem;color:#3a6347;">
      ${es ? '🔒 Esta clase es <strong>solo privada</strong> — tendrás la instructora para ti solo.' : '🔒 This class is <strong>private only</strong> — you will have the instructor all to yourself.'}
    </div>`;
  } else if (mode === 'group_only' || groupCount > 0) {
    // group_only slots, OR 'both' slots that already have group bookings → group only, no private option
    selectedBookingMode = 'group';
    modeSelector = `<div style="background:var(--greige-light);border-left:3px solid var(--greige-dark);padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.82rem;color:var(--charcoal-dark);">
      ${es ? `👥 Esta es una <strong>clase grupal</strong> — quedan <strong>${spotsLeft} lugar${spotsLeft !== 1 ? 'es' : ''}</strong> de 4.` : `👥 This is a <strong>group class</strong> — <strong>${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''}</strong> of 4 remaining.`}
    </div>`;
  } else {
    // 'both' slot with no bookings yet — customer can choose
    selectedBookingMode = 'private';
    modeSelector = `
      <div style="margin-bottom:1.2rem;">
        <p style="font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--charcoal);margin-bottom:0.8rem;">${es ? 'Modalidad de clase' : 'Class mode'}</p>
        <div style="display:flex;gap:0.8rem;">
          <label id="opt-private" onclick="setBookingMode('private')" style="flex:1;border:2px solid var(--charcoal-dark);padding:0.8rem;text-align:center;cursor:pointer;font-size:0.8rem;background:var(--charcoal-dark);color:white;">
            🔒 ${es ? 'Privada' : 'Private'}
          </label>
          <label id="opt-group" onclick="setBookingMode('group')" style="flex:1;border:2px solid var(--greige);padding:0.8rem;text-align:center;cursor:pointer;font-size:0.8rem;background:white;color:var(--charcoal-dark);">
            👥 ${es ? 'Grupal' : 'Group'} (${spotsLeft} ${es ? 'lugares' : 'spots'})
          </label>
        </div>
        <p id="mode-desc" style="font-size:0.78rem;color:var(--charcoal);margin-top:0.7rem;line-height:1.6;">
          ${es ? 'Tendrás la instructora completamente para ti.' : 'You will have the instructor entirely to yourself.'}
        </p>
      </div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <h2>${es ? 'Confirmar reserva' : 'Confirm booking'}</h2>
    ${slotInfo}
    ${modeSelector}
    <div id="booking-error"></div>
    <button class="btn-confirm" onclick="confirmBooking()" id="confirm-btn">
      ${es ? 'CONFIRMAR RESERVA' : 'CONFIRM BOOKING'}
    </button>`;
  document.getElementById('modal').classList.add('active');
}

function setBookingMode(mode) {
  selectedBookingMode = mode;
  const es = isEs();
  const optPrivate = document.getElementById('opt-private');
  const optGroup = document.getElementById('opt-group');
  const desc = document.getElementById('mode-desc');
  if (!optPrivate) return;
  if (mode === 'private') {
    optPrivate.style.background = 'var(--charcoal-dark)';
    optPrivate.style.color = 'white';
    optPrivate.style.borderColor = 'var(--charcoal-dark)';
    optGroup.style.background = 'white';
    optGroup.style.color = 'var(--charcoal-dark)';
    optGroup.style.borderColor = 'var(--greige)';
    desc.textContent = es ? 'Tendrás la instructora completamente para ti.' : 'You will have the instructor entirely to yourself.';
  } else {
    optGroup.style.background = 'var(--charcoal-dark)';
    optGroup.style.color = 'white';
    optGroup.style.borderColor = 'var(--charcoal-dark)';
    optPrivate.style.background = 'white';
    optPrivate.style.color = 'var(--charcoal-dark)';
    optPrivate.style.borderColor = 'var(--greige)';
    desc.textContent = es ? 'Puede haber hasta 4 personas en la clase, incluido tú.' : 'There may be up to 4 people in the class, including you.';
  }
}

async function confirmBooking() {
  const es = isEs();
  const errEl = document.getElementById('booking-error');
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = es ? 'PROCESANDO...' : 'PROCESSING...';

  const { data: { session } } = await supabaseClient.auth.getSession();
  let name = '', phone = '';
  if (session?.user?.id) {
    const { data: profile } = await supabaseClient
      .from('customer_profiles').select('full_name, phone').eq('id', session.user.id).single();
    name = profile?.full_name || '';
    phone = profile?.phone || '';
  }

  const { error: bookingError } = await supabaseClient.from('bookings').insert({
    slot_id: selectedSlot.id,
    customer_name: name,
    customer_phone: phone,
    customer_id: session?.user?.id,
    cancelled: false,
    booking_mode: selectedBookingMode
  });

  if (bookingError) {
    errEl.innerHTML = `<p class="error-msg">${es ? 'Hubo un error. Por favor intenta de nuevo.' : 'There was an error. Please try again.'}</p>`;
    btn.disabled = false;
    btn.textContent = es ? 'CONFIRMAR RESERVA' : 'CONFIRM BOOKING';
    return;
  }

  // Private booking → slot disappears (is_booked = true)
  // Group booking → increment counter, only mark full at 4
  if (selectedBookingMode === 'private') {
    await supabaseClient.from('time_slots').update({ is_booked: true }).eq('id', selectedSlot.id);
    const idx = allSlots.findIndex(s => s.id === selectedSlot.id);
    if (idx !== -1) allSlots[idx].is_booked = true;
  } else {
    const newCount = getGroupCount(selectedSlot) + 1;
    const updates = { group_booking_count: newCount };
    if (newCount >= 4) updates.is_booked = true;
    await supabaseClient.from('time_slots').update(updates).eq('id', selectedSlot.id);
    const idx = allSlots.findIndex(s => s.id === selectedSlot.id);
    if (idx !== -1) {
      allSlots[idx].group_booking_count = newCount;
      if (newCount >= 4) allSlots[idx].is_booked = true;
    }
  }
  renderSlots();

  // Send confirmation email to client
  sendEmail('booking_confirmed', session.user.email, {
    customer_name: name || session.user.email,
    instructor_name: selectedSlot.instructors?.name,
    date: selectedSlot.date,
    time: selectedSlot.start_time,
    class_type: selectedBookingMode === 'group' ? (es ? 'Grupal' : 'Group') : (es ? 'Privada' : 'Private')
  });

  // Notify instructor of new booking
  if (selectedSlot.instructors?.email) {
    sendEmail('new_booking_instructor', selectedSlot.instructors.email, {
      instructor_name: selectedSlot.instructors.name,
      customer_name: name || session.user.email,
      customer_phone: phone || '—',
      date: selectedSlot.date,
      time: selectedSlot.start_time,
      class_type: selectedBookingMode === 'group' ? 'Grupal' : 'Privada'
    });
  }

  // Update Google Calendar event: set client name as title + instructor color
  updateCalendarBooking({
    slot_id: selectedSlot.id,
    instructor_id: selectedSlot.instructor_id,
    instructor_name: selectedSlot.instructors?.name,
    client_name: name || session.user.email,
    date: selectedSlot.date,
    start_time: selectedSlot.start_time,
    class_type: selectedBookingMode
  });

  document.getElementById('modal-content').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <h3>${es ? '¡Reserva confirmada!' : 'Booking confirmed!'}</h3>
      <p>${es
        ? `Tu clase ${selectedBookingMode === 'group' ? 'grupal' : 'privada'} con <strong>${selectedSlot.instructors?.name}</strong> el <strong>${formatDate(selectedSlot.date)}</strong> a las <strong>${formatTime(selectedSlot.start_time)}</strong> ha sido reservada.`
        : `Your ${selectedBookingMode} class with <strong>${selectedSlot.instructors?.name}</strong> on <strong>${formatDate(selectedSlot.date)}</strong> at <strong>${formatTime(selectedSlot.start_time)}</strong> has been booked.`}
      </p>
      <div style="margin:1.5rem 0;padding:1.2rem;background:var(--cream);border:1px solid var(--greige);text-align:center;">
        <p style="font-size:0.78rem;color:var(--charcoal);line-height:1.7;">
          ${es ? 'Puedes ver y cancelar tu reserva desde <strong>Mi Cuenta</strong>.' : 'You can view and cancel your booking from <strong>My Account</strong>.'}
        </p>
      </div>
      <a href="customer.html" style="display:block;padding:1rem;background:var(--charcoal-dark);color:white;text-align:center;text-decoration:none;font-family:'Jost',sans-serif;font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.8rem;">
        ${es ? 'VER MIS RESERVAS' : 'VIEW MY BOOKINGS'}
      </a>
      <button class="btn-confirm" style="background:none;border:1px solid var(--greige);color:var(--charcoal-dark);" onclick="closeModal()">
        ${es ? 'CERRAR' : 'CLOSE'}
      </button>
    </div>`;
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  selectedSlot = null;
  selectedBookingMode = 'private';
}

document.getElementById('filter-date').addEventListener('change', renderSlots);
document.getElementById('filter-instructor').addEventListener('change', renderSlots);
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

loadData();

// Require login
supabaseClient.auth.getSession().then(({ data }) => {
  if (!data.session) {
    window.location.href = 'customer.html';
  }
});
</script>
</body>
</html>
