<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Instructora — Aliza Pilates Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --greige: #C8C4B7; --greige-light: #E8E4D9; --greige-dark: #A8A49A;
      --charcoal: #8B8578; --charcoal-dark: #5C5A55; --cream: #F7F5F0;
      --white: #FFFFFF; --text-dark: #3A3935; --error: #C0392B; --success: #4A7C59;
    }
    body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

    /* LOGIN */
    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--charcoal-dark); padding: 2rem;
    }
    .login-box { background: var(--white); padding: 3rem; max-width: 420px; width: 100%; }
    .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--charcoal-dark); text-align: center; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .login-subtitle { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--greige-dark); text-align: center; margin-bottom: 2.5rem; }
    .login-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--charcoal-dark); text-align: center; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--charcoal); margin-bottom: 0.5rem; }
    .form-group input, .form-group select {
      width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--greige);
      background: var(--cream); font-family: 'Jost', sans-serif; font-size: 0.9rem;
      color: var(--text-dark); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--charcoal-dark); }
    .btn-primary {
      width: 100%; padding: 1rem; background: var(--charcoal-dark); color: var(--white);
      border: none; font-family: 'Jost', sans-serif; font-size: 0.8rem;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--text-dark); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }

    /* DASHBOARD */
    .dashboard { display: none; min-height: 100vh; }
    .dashboard.active { display: block; }

    .dash-nav {
      background: var(--charcoal-dark); padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .dash-nav-left { display: flex; align-items: center; gap: 1.5rem; }
    .dash-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--greige-light); }
    .dash-welcome { font-size: 0.78rem; color: var(--greige-dark); letter-spacing: 0.05em; }
    .btn-logout {
      background: none; border: 1px solid var(--greige-dark); color: var(--greige-light);
      padding: 0.4rem 1rem; font-family: 'Jost', sans-serif; font-size: 0.72rem;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }

    .dash-layout { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; display: grid; grid-template-columns: 1fr 360px; gap: 2.5rem; }

    /* MY SCHEDULE */
    .schedule-panel h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--charcoal-dark); margin-bottom: 0.4rem; }
    .schedule-panel .subtitle { font-size: 0.78rem; color: var(--charcoal); letter-spacing: 0.05em; margin-bottom: 2rem; }

    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--greige-light); margin-bottom: 2rem; }
    .tab {
      padding: 0.7rem 1.5rem; font-size: 0.75rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--charcoal); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s;
    }
    .tab.active { color: var(--charcoal-dark); border-bottom-color: var(--charcoal-dark); }

    .slots-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .slot-row {
      background: var(--white); border: 1px solid var(--greige-light);
      padding: 1.2rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    .slot-row-info {}
    .slot-row-date { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--greige-dark); margin-bottom: 0.2rem; }
    .slot-row-time { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--charcoal-dark); }
    .slot-row-type { font-size: 0.75rem; color: var(--charcoal); margin-top: 0.15rem; }
    .slot-row-actions { display: flex; align-items: center; gap: 1rem; }
    .slot-booked-badge {
      background: var(--greige-light); color: var(--charcoal-dark);
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; cursor: pointer; border: 1px solid var(--greige);
    }
    .slot-booked-badge:hover { background: var(--greige); }
    .btn-delete {
      background: none; border: 1px solid var(--greige); color: var(--greige-dark);
      padding: 0.4rem 0.9rem; font-family: 'Jost', sans-serif; font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { border-color: var(--error); color: var(--error); }
    .empty-state { text-align: center; padding: 3rem; color: var(--charcoal); font-size: 0.9rem; line-height: 1.8; }

    /* ADD SLOT PANEL */
    .add-panel { height: fit-content; position: sticky; top: 1rem; }
    .add-panel-inner { background: var(--white); border: 1px solid var(--greige-light); padding: 2rem; }
    .add-panel h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: var(--charcoal-dark); margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--greige-light); }
    .btn-add {
      width: 100%; padding: 0.9rem; background: var(--charcoal-dark); color: var(--white);
      border: none; font-family: 'Jost', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-add:hover { background: var(--text-dark); }
    .success-toast {
      background: var(--success); color: white; padding: 0.8rem 1rem;
      font-size: 0.8rem; margin-top: 0.8rem; text-align: center; display: none;
      letter-spacing: 0.05em;
    }

    /* BOOKING INFO MODAL */
    .info-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(58,57,53,0.6); z-index: 200;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .info-overlay.active { display: flex; }
    .info-modal { background: var(--white); max-width: 420px; width: 100%; padding: 2rem; position: relative; }
    .info-modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; color: var(--charcoal-dark); margin-bottom: 1.5rem; }
    .info-row { display: flex; justify-content: space-between; padding: 0.7rem 0; border-bottom: 1px solid var(--greige-light); font-size: 0.85rem; }
    .info-row:last-of-type { border-bottom: none; }
    .info-label { color: var(--charcoal); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .info-value { color: var(--text-dark); font-weight: 400; }
    .btn-close-info {
      width: 100%; margin-top: 1.5rem; padding: 0.8rem; background: var(--cream);
      border: 1px solid var(--greige); font-family: 'Jost', sans-serif; font-size: 0.75rem;
      letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; color: var(--charcoal-dark);
    }

    .loading { padding: 2rem; text-align: center; color: var(--charcoal); font-size: 0.85rem; }

    .btn-approve {
      background: var(--success); color: white; border: none;
      font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.45rem 1rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-approve:hover { background: #3a6347; }
    .btn-decline {
      background: none; border: 1px solid var(--error); color: var(--error);
      font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.45rem 1rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-decline:hover { background: var(--error); color: white; }

    @media (max-width: 800px) {
      .dash-layout { grid-template-columns: 1fr; }
      .add-panel { position: static; }
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="login-page">
  <div class="login-box">
    <div class="login-logo">ALIZA PILATES STUDIO</div>
    <div class="login-subtitle">Panel de Instructora</div>
    <h2>Iniciar sesión</h2>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="tu@correo.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <div id="login-error"></div>
    <button class="btn-primary" onclick="login()" id="login-btn">ENTRAR</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-nav">
    <div class="dash-nav-left">
      <div class="dash-logo">Aliza Pilates Studio</div>
      <div class="dash-welcome" id="dash-welcome">Bienvenida</div>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="dash-layout">
    <div class="schedule-panel">
      <h2>Mi horario</h2>
      <p class="subtitle">Gestiona tus clases disponibles y ve quién ha reservado</p>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('upcoming', this)">Próximas</div>
        <div class="tab" onclick="switchTab('past', this)">Pasadas</div>
        <div class="tab" onclick="switchTab('requests', this)">Solicitudes ●</div>
      </div>
      <div class="slots-list" id="slots-list"><div class="loading">Cargando...</div></div>
    </div>

    <div class="add-panel">
      <div class="add-panel-inner">
        <h3>Añadir clase disponible</h3>
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="new-date" />
        </div>
        <div class="form-group">
          <label>Hora de inicio</label>
          <select id="new-time">
            <option value="">— Selecciona hora —</option>
          </select>
        </div>
        <div class="form-group">
          <label>Modalidad</label>
          <select id="new-mode">
            <option value="both">Privada o Grupal (cliente elige)</option>
            <option value="private_only">Solo Privada</option>
            <option value="group_only">Solo Grupal (máx. 4 personas)</option>
          </select>
        </div>
        <div id="add-error"></div>
        <button class="btn-add" onclick="addSlot()">+ AÑADIR CLASE</button>
        <div class="success-toast" id="add-toast">✓ Clase añadida correctamente</div>
      </div>
    </div>
  </div>
</div>

<!-- BOOKING INFO MODAL -->
<div class="info-overlay" id="info-overlay">
  <div class="info-modal">
    <h3>Información de la reserva</h3>
    <div id="info-content"></div>
    <button class="btn-close-info" onclick="document.getElementById('info-overlay').classList.remove('active')">CERRAR</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jpbouksgzaaykkqgsipa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwYm91a3NnemFheWtrcWdzaXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQyNTUsImV4cCI6MjA4OTQ1MDI1NX0.XxoVzmz7BACVvI3UYUhoxG-p7W7Ck8EGbMXK9IB2azg';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function sendEmail(type, to, data) {
  try {
    await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ type, to, data })
    });
  } catch(e) { console.error('Email error:', e); }
}

let currentUser = null;
let currentInstructor = null;
let mySlots = [];
let currentTab = 'upcoming';

function populateTimeOptions() {
  const sel = document.getElementById('new-time');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Selecciona hora —</option>';
  for (let h = 6; h <= 21; h++) {
    [0, 15, 30, 45].forEach(m => {
      const hStr = h.toString().padStart(2, '0');
      const mStr = m.toString().padStart(2, '0');
      const hour12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
      const ampm = h >= 12 ? 'PM' : 'AM';
      sel.innerHTML += `<option value="${hStr}:${mStr}">${hour12}:${mStr} ${ampm}</option>`;
    });
  }
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');

  if (!email || !password) {
    errEl.innerHTML = '<p class="error-msg">Por favor completa todos los campos.</p>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'ENTRANDO...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.innerHTML = '<p class="error-msg">Correo o contraseña incorrectos.</p>';
    btn.disabled = false;
    btn.textContent = 'ENTRAR';
    return;
  }

  currentUser = data.user;
  await loadDashboard();
}

async function loadDashboard() {
  const { data: instructor } = await supabaseClient
    .from('instructors').select('*').eq('id', currentUser.id).single();

  currentInstructor = instructor;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('dash-welcome').textContent = `Bienvenida, ${instructor?.name?.split(' ')[0] || ''}`;

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('new-date').min = today;
  populateTimeOptions();
  await loadSlots();
}

async function loadRequests() {
  const { data } = await supabaseClient
    .from('class_requests')
    .select('*')
    .order('created_at', { ascending: false });

  const list = document.getElementById('slots-list');
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty-state">No hay solicitudes de clase.</div>';
    return;
  }

  const pending = data.filter(r => r.status === 'pending');
  const resolved = data.filter(r => r.status !== 'pending');

  let html = '';

  if (pending.length > 0) {
    html += `<p style="font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--greige-dark);margin-bottom:1rem;">Pendientes (${pending.length})</p>`;
    html += pending.map(r => renderRequestRow(r)).join('');
  }

  if (resolved.length > 0) {
    html += `<p style="font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--greige-dark);margin:2rem 0 1rem;">Anteriores</p>`;
    html += resolved.map(r => renderRequestRow(r)).join('');
  }

  list.innerHTML = html;
}

function renderRequestRow(r) {
  const statusLabel = { pending: 'Pendiente', confirmed: 'Confirmada', declined: 'Rechazada' };
  const statusStyle = {
    pending: 'background:#fdf8f0;color:#8a5c1a;border:1px solid #e8c97a;',
    confirmed: 'background:#f0f7f2;color:#4A7C59;border:1px solid #a8d5b5;',
    declined: 'background:#fdf0f0;color:#C0392B;border:1px solid #e8a8a8;'
  };
  const isPending = r.status === 'pending';
  return `
    <div class="slot-row" id="req-${r.id}" style="${!isPending ? 'opacity:0.6;' : ''}">
      <div class="slot-row-info">
        <div class="slot-row-date">${formatDate(r.requested_date)}</div>
        <div class="slot-row-time">${formatTime(r.requested_time)}</div>
        <div class="slot-row-type">${r.class_type} · <strong style="color:var(--charcoal-dark);">${r.customer_name}</strong> · ${r.customer_phone}</div>
        ${r.notes ? `<div class="slot-row-type" style="font-style:italic;margin-top:0.2rem;">"${r.notes}"</div>` : ''}
      </div>
      <div class="slot-row-actions">
        ${isPending
          ? `<button class="btn-approve" onclick="handleRequest('${r.id}', 'confirmed')">✓ Confirmar</button>
             <button class="btn-decline" onclick="handleRequest('${r.id}', 'declined')">✗ Rechazar</button>`
          : `<span style="font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 0.8rem;${statusStyle[r.status] || ''}">${statusLabel[r.status] || r.status}</span>`
        }
      </div>
    </div>`;
}

async function handleRequest(requestId, newStatus) {
  const row = document.getElementById(`req-${requestId}`);
  if (row) row.style.opacity = '0.5';

  // Fetch the request first — needed for both confirm and decline
  const { data: req, error: reqErr } = await supabaseClient
    .from('class_requests')
    .select('*')
    .eq('id', requestId)
    .single();

  if (reqErr || !req) {
    if (row) row.style.opacity = '1';
    alert('Error al obtener la solicitud. Intenta de nuevo.');
    return;
  }

  // Fetch student profile for email
  const { data: profile } = await supabaseClient
    .from('customer_profiles')
    .select('email, full_name')
    .eq('id', req.customer_id)
    .single();

  if (newStatus === 'confirmed') {
    // 1. Create the time slot
    const bookingMode = (req.class_type === 'Grupal') ? 'group' : 'private';
    const slotMode = (req.class_type === 'Grupal') ? 'group_only' : 'private_only';

    const { data: slot, error: slotErr } = await supabaseClient
      .from('time_slots')
      .insert({
        instructor_id: currentUser.id,
        date: req.requested_date,
        start_time: req.requested_time,
        class_type: req.class_type,
        slot_mode: slotMode,
        is_booked: true
      })
      .select()
      .single();

    if (slotErr || !slot) {
      if (row) row.style.opacity = '1';
      alert('Error al crear el horario. Intenta de nuevo.');
      return;
    }

    // 2. Create the booking
    const { error: bookingErr } = await supabaseClient
      .from('bookings')
      .insert({
        slot_id: slot.id,
        customer_id: req.customer_id,
        customer_name: req.customer_name,
        customer_phone: req.customer_phone,
        booking_mode: bookingMode,
        cancelled: false
      });

    if (bookingErr) {
      await supabaseClient.from('time_slots').delete().eq('id', slot.id);
      if (row) row.style.opacity = '1';
      alert('Error al crear la reserva. Intenta de nuevo.');
      return;
    }
  }

  // 3. Update the request status
  const { error } = await supabaseClient
    .from('class_requests')
    .update({ status: newStatus })
    .eq('id', requestId);

  if (error) {
    if (row) row.style.opacity = '1';
    alert('Error al actualizar la solicitud. Intenta de nuevo.');
    return;
  }

  // 4. Send email to student
  if (profile?.email) {
    sendEmail(
      newStatus === 'confirmed' ? 'request_confirmed' : 'request_declined',
      profile.email,
      {
        customer_name: req.customer_name || profile.full_name,
        date: req.requested_date,
        time: req.requested_time,
        class_type: req.class_type
      }
    );
  }

  // 5. Refresh — if confirmed, switch instructor to Próximas so they see the new slot
  await loadSlots();
  await loadRequests();

  if (newStatus === 'confirmed') {
    // Switch to Próximas tab
    const upcomingTab = document.querySelector('.tab');
    if (upcomingTab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      upcomingTab.classList.add('active');
      currentTab = 'upcoming';
      renderSlots();
    }
  }
}

async function loadSlots() {
  const { data } = await supabaseClient
    .from('time_slots')
    .select('*, bookings(id, cancelled, booking_mode, customer_name, customer_phone)')
    .eq('instructor_id', currentUser.id)
    .order('date').order('start_time');

  mySlots = data || [];
  renderSlots();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'requests') { loadRequests(); } else { renderSlots(); }
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-PA', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function formatTime(timeStr) {
  const [h, m] = timeStr.split(':');
  const hour = parseInt(h);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const h12 = hour > 12 ? hour - 12 : hour === 0 ? 12 : hour;
  return `${h12}:${m} ${ampm}`;
}

function renderSlots() {
  const today = new Date().toISOString().split('T')[0];
  const filtered = mySlots.filter(s =>
    currentTab === 'upcoming' ? s.date >= today : s.date < today
  );

  const list = document.getElementById('slots-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">${currentTab === 'upcoming'
      ? 'No tienes clases próximas.<br>Añade tus horarios disponibles.'
      : 'No hay clases pasadas.'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(slot => {
    const activeBookings = (slot.bookings || []).filter(b => !b.cancelled);
    const groupBookings = activeBookings.filter(b => b.booking_mode === 'group');
    const privateBooking = activeBookings.find(b => b.booking_mode === 'private');
    const mode = slot.slot_mode || 'both';

    // Status display
    let statusHtml = '';
    if (mode === 'group_only' || (mode === 'both' && !privateBooking)) {
      const count = groupBookings.length;
      if (count === 0) {
        statusHtml = `<span style="font-size:0.72rem;color:var(--charcoal);">Disponible</span>`;
      } else if (count >= 4) {
        statusHtml = `<span style="font-size:0.72rem;color:var(--success);">Grupal · 4/4 completo</span>`;
      } else {
        statusHtml = `<span style="font-size:0.72rem;color:var(--success);">Grupal · ${count}/4 reservados</span>`;
      }
    } else if (slot.is_booked) {
      statusHtml = `<span style="font-size:0.72rem;color:var(--success);">Privada · Reservada</span>`;
    } else {
      statusHtml = `<span style="font-size:0.72rem;color:var(--charcoal);">Disponible</span>`;
    }

    const modeLabel = mode === 'group_only' ? 'Solo Grupal' : mode === 'private_only' ? 'Solo Privada' : 'Privada o Grupal';

    // Actions
    const booking = activeBookings[0];
    const actionsHtml = (slot.is_booked || groupBookings.length > 0) && booking
      ? `<div class="slot-row-actions">
           <div class="slot-booked-badge" onclick="showBookingInfo('${slot.id}')">Ver reserva${groupBookings.length > 1 ? 's' : ''}</div>
           ${currentTab === 'upcoming' ? `<button class="btn-delete" onclick="deleteSlot('${slot.id}')">Cancelar</button>` : ''}
         </div>`
      : `<div class="slot-row-actions">
           ${currentTab === 'upcoming' ? `<button class="btn-delete" onclick="deleteSlot('${slot.id}')">Eliminar</button>` : ''}
         </div>`;

    return `<div class="slot-row" id="slot-${slot.id}">
      <div class="slot-row-info">
        <div class="slot-row-date">${formatDate(slot.date)}</div>
        <div class="slot-row-time">${formatTime(slot.start_time)}</div>
        <div class="slot-row-type">${modeLabel} · ${statusHtml}</div>
      </div>
      ${actionsHtml}
    </div>`;
  }).join('');
}

function showBookingInfo(slotId) {
  const slot = mySlots.find(s => s.id === slotId);
  if (!slot) return;
  const activeBookings = (slot.bookings || []).filter(b => !b.cancelled);
  if (activeBookings.length === 0) return;

  const booked = (b) => new Date(b.created_at).toLocaleDateString('es-PA', { day: 'numeric', month: 'long', year: 'numeric' });

  let rows = '';
  if (activeBookings.length === 1) {
    const b = activeBookings[0];
    rows = `
      <div class="info-row"><span class="info-label">Alumno/a</span><span class="info-value">${b.customer_name}</span></div>
      <div class="info-row"><span class="info-label">Teléfono</span><span class="info-value">${b.customer_phone}</span></div>
      <div class="info-row"><span class="info-label">Modalidad</span><span class="info-value">${b.booking_mode === 'group' ? 'Grupal' : 'Privada'}</span></div>
      <div class="info-row"><span class="info-label">Clase</span><span class="info-value">${formatDate(slot.date)} · ${formatTime(slot.start_time)}</span></div>`;
  } else {
    // Multiple group bookings
    rows = `<div class="info-row"><span class="info-label">Clase grupal</span><span class="info-value">${activeBookings.length}/4 personas</span></div>`;
    activeBookings.forEach((b, i) => {
      rows += `
        <div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--greige-light);">
          <div class="info-row"><span class="info-label">Alumno/a ${i + 1}</span><span class="info-value">${b.customer_name}</span></div>
          <div class="info-row"><span class="info-label">Teléfono</span><span class="info-value">${b.customer_phone}</span></div>
        </div>`;
    });
  }

  document.getElementById('info-content').innerHTML = rows;
  document.getElementById('info-overlay').classList.add('active');
}

async function addSlot() {
  const date = document.getElementById('new-date').value;
  const time = document.getElementById('new-time').value;
  const mode = document.getElementById('new-mode').value;
  const errEl = document.getElementById('add-error');

  if (!date || !time) {
    errEl.innerHTML = '<p class="error-msg">Por favor completa la fecha y hora.</p>';
    return;
  }

  errEl.innerHTML = '';
  const { error } = await supabaseClient.from('time_slots').insert({
    instructor_id: currentUser.id,
    date,
    start_time: time,
    class_type: mode === 'group_only' ? 'Grupal' : 'Privada',
    slot_mode: mode
  });

  if (error) {
    errEl.innerHTML = '<p class="error-msg">Error al añadir. Intenta de nuevo.</p>';
    return;
  }

  document.getElementById('new-date').value = '';
  document.getElementById('new-time').value = '';
  const toast = document.getElementById('add-toast');
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
  await loadSlots();
}

async function deleteSlot(slotId) {
  const slot = mySlots.find(s => s.id === slotId);
  const msg = slot?.is_booked
    ? '¿Estás segura de que quieres cancelar esta clase? Ya tiene una reserva.'
    : '¿Estás segura de que quieres eliminar este horario?';
  if (!confirm(msg)) return;
  await supabaseClient.from('time_slots').delete().eq('id', slotId);
  await loadSlots();
}

async function logout() {
  await supabaseClient.auth.signOut();
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  currentUser = null; currentInstructor = null;
}

// Check if already logged in
supabaseClient.auth.getSession().then(({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    loadDashboard();
  }
});
</script>
</body>
</html>
